# Reference billing.config.yaml — the frameworks/billing example settlement topology.
# Validated by validate-billing.py against billing-config.schema.json. See README.md.

product: dispatch

# Ledger-only until a deliberate, customer-ready go-live (recommended live default: stripe).
# Flipping to `stripe` is the money-moving step; keep it ledger-only until that decision.
authoritative: none

# Metronome rates the same usage but never collects (dual-readiness as a shadow rail).
shadows: [metronome]
mirror: supabase

passthrough_unit_decimal: "100"     # THE CENTS INVARIANT. Σ(amount_usd) × 100 = invoice cents.
idempotency: per-decision-uuid      # one UUID per decision → ledger + authoritative + shadows + mirror

# Metronome org OAuth connection not yet established → Metronome stays shadow-only.
metronome_connection_gated: true

meters:
  - name: decisions
    rate_cents: 0.01                # $0.0001/decision × 100
    aggregation: sum
