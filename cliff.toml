# git-cliff — generate CHANGELOG.md from Conventional Commit history.
# Fits wave-foundation: no package.json, consumed by tag/SHA pin, commits already conventional
# (enforced by semantic-pr.yml). Changesets is NOT used here (it's for npm-publishing repos like
# wave-surfer-connect). Run: git cliff -o CHANGELOG.md
[changelog]
header = "# Changelog\n\nAll notable changes to wave-foundation. Consumed by tag/SHA pin.\n"
body = """
{% if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## [unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}
{% endfor %}\n
"""
trim = true
# Collapse the blank-line runs the loops emit so the output is markdownlint-clean (MD012).
postprocessors = [{ pattern = '\n{3,}', replace = "\n\n" }]

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^Merge ", skip = true },
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^refactor", group = "Refactor" },
  { message = "^perf", group = "Performance" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI/CD" },
  { message = "^chore", skip = true },
  { message = ".*", group = "Other" },
]
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
