name: OpenSSF Scorecard

# Supply-chain security posture report card (branch protection, pinned deps, token perms, etc.).
# Uploads SARIF to the Security tab. Most valuable once a repo is public; harmless on private.

on:
  branch_protection_rule:
  schedule:
    - cron: "24 6 * * 1"
  push:
    branches: [master, main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scorecard publishes to the public OSSF API + code scanning — only meaningful on a
    # public repo. Skip cleanly on private (no perpetual red); auto-runs once open-sourced.
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          sarif_file: results.sarif
