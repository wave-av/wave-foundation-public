name: lint

# Conservative lint gate for the public framework mirror.
# - shellcheck at severity=warning (note-level findings are advisory and do not fail)
# - ruff scoped to a correctness-focused, clean-today ruleset (E4/E7/E9/F/W);
#   E501 line-length is intentionally excluded to avoid reformatting framework prose.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # shellcheck is preinstalled on ubuntu runners.
      - name: shellcheck (-S warning)
        run: shellcheck -S warning $(git ls-files '*.sh')

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'
      - name: install ruff
        run: pip install ruff
      - name: ruff (E4,E7,E9,F,W)
        run: ruff check --select E4,E7,E9,F,W .
