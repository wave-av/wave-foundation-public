# Dogfooding: wave-foundation runs its OWN shared gate against itself, so the repo that defines the
# rules also passes them. Secret-scan honors `pragma: allowlist secret` AND .github/.secret-allowlist
# (paths that hold credential SHAPES — detector defs, fixtures, placeholder setup docs — not secrets).
name: self-check

on:
  pull_request:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Secret scan (self, allowlist-aware)
        run: |
          PATTERNS='(sk-[A-Za-z0-9]{20}|sk_(live|test)_[A-Za-z0-9]{20}|npm_[A-Za-z0-9]{30}|sbp_[a-f0-9]{40}|github_pat_[A-Za-z0-9_]{40}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30}|AIzaSy[A-Za-z0-9_-]{20}|xai-[A-Za-z0-9]{40}|xoxb-[A-Za-z0-9-]+|-----BEGIN [A-Z ]*PRIVATE KEY)'
          HITS=$(grep -rIEn "$PATTERNS" --exclude-dir=.git --exclude-dir=node_modules . \
                 | grep -v 'allowlist secret' \
                 | { grep -vFf .github/.secret-allowlist || true; } )
          if [ -n "$HITS" ]; then echo "::error::real-secret-shaped string outside the allowlist"; echo "$HITS"; exit 1; fi
          echo "secret-scan clean (allowlist-aware)"
  file-size:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: File-size gate (skills/agents docs may legitimately exceed; code must not)
        run: |
          fail=0
          while IFS= read -r f; do
            grep -qxF "$f" .github/.filesize-allowlist 2>/dev/null && continue   # justified harvested exception
            n=$(wc -l < "$f")
            if [ "$n" -gt 1000 ]; then echo "::error::$f has $n lines (> 1000)"; fail=1; fi
          done < <(git ls-files '*.ts' '*.tsx' '*.js' '*.py' | grep -vE '\.(types|d)\.ts$')
          if [ "$fail" = 0 ]; then echo "file-size gate passed"; fi
          exit "$fail"
  skill-validate:
    # The gate that would have caught the 2026-05-26 regression: validates every SKILL.md's
    # frontmatter (valid YAML, no dup keys, name==dir, non-empty description + allowed-tools).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - run: pip install pyyaml
      - name: Validate skill frontmatter
        run: python3 scripts/validate-skills.py
  version-sync:
    # plugin.json version == marketplace.json version == latest git tag (catches manifest drift —
    # e.g. a release tagged while the manifests were left behind). Maintained by scripts/release.sh.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # need tags for the version<->tag comparison
          persist-credentials: false
      - name: Check version consistency
        # Graceful no-op on the public mirror, where this script isn't in the open-core allowlist.
        run: |
          [ -f scripts/check-version-sync.py ] || { echo "::notice::version-sync script absent (public mirror) — skipping"; exit 0; }
          python3 scripts/check-version-sync.py
  claude-api-shape:
    # Dogfood the Claude-API request-shape linter against this repo (the chassis under
    # frameworks/model-routing/local_offload talks to the API). Blocking here — foundation enforces
    # the rule it ships. Spokes get the advisory form via the reusable checks.yml.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Claude-API request-shape gate (canonical script)
        run: bash frameworks/claude-api/lint-request-shape.sh
  gate-registry-drift:
    # Make frameworks/gates/registry.yaml the provable source of truth: fail if the live
    # .pre-commit-config.yaml local hooks don't match what the registry declares. Add a gate in the
    # registry, regenerate, commit — or this fails.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - run: pip install pyyaml
      - name: Gate registry ↔ pre-commit parity
        run: python3 frameworks/gates/emit.py --check .pre-commit-config.yaml
  product-registry-drift:
    # Single-source the WAVE product registry: products.manifest.json is canonical; the chassis
    # WAVE_PRODUCTS array (which renders the human product-nav AND the agent wave-products.json) must
    # match it — every built product present, accent hex derived from the manifest OKLCH (never hand-
    # typed twice). Add/repaint a product in the manifest, regenerate nav.ts — or this fails. (#69)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Manifest ↔ chassis WAVE_PRODUCTS parity
        run: |
          [ -f staging/golden-paths-scaffolds/new-subdomain-app/validators/check-registry.mjs ] || { echo "::notice::registry validator absent (public mirror) — skipping"; exit 0; }
          node staging/golden-paths-scaffolds/new-subdomain-app/validators/check-registry.mjs
  capabilities-honesty:
    # Dogfood the anti-vaporware honesty gate (#291): foundation runs the check it ships for the
    # fleet. BLOCKING here (foundation enforces its own rules) — first via --self-test (the fixtures
    # that pin metered/auth-without-enforcement detection + the gateway-fronted escape), then against
    # this repo's own capabilities.json (clean: no metered/auth API claims).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: Install tsx
        run: npm install --no-save --no-audit --no-fund tsx@4
      - name: Honesty check self-test (fixtures)
        run: npx tsx frameworks/platform-registry/scripts/check-honesty.ts --self-test
      - name: Honesty check on own capabilities.json
        run: npx tsx frameworks/platform-registry/scripts/check-honesty.ts capabilities.json --root .
