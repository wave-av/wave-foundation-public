name: pinact (Action pinning)

# Verify every GitHub Action under .github/ is pinned to a full-length commit SHA and that the
# version comment matches the pin. Runs the pinact CLI (honors .pinact.yaml; defaults to
# .github/workflows + .github/actions) rather than the repo-wide action, so the 200+ un-vetted
# harvested workflows under staging/ stay out of scope. Renovate keeps the SHAs fresh.

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

env:
  PINACT_VERSION: 4.0.0
  # sha256 of pinact_linux_amd64.tar.gz from the v4.0.0 release checksums.txt
  PINACT_SHA256: cc220902615325b10bd3bc52ed3de27488f79adaec52adcd12bd2194c2d2c592

jobs:
  pinact:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Install pinact CLI (pinned + checksum-verified)
        run: |
          tmp="$(mktemp -d)"
          curl -fsSL -o "$tmp/pinact.tar.gz" \
            "https://github.com/suzuki-shunsuke/pinact/releases/download/v${PINACT_VERSION}/pinact_linux_amd64.tar.gz"
          echo "${PINACT_SHA256}  $tmp/pinact.tar.gz" | sha256sum -c -
          tar -xzf "$tmp/pinact.tar.gz" -C "$tmp"
          install -m 0755 "$tmp/pinact" /usr/local/bin/pinact
      - name: Verify Actions are SHA-pinned
        env:
          GITHUB_TOKEN: ${{ github.token }} # resolve SHA<->tag via API without anon rate limits
        run: pinact run --check --verify
